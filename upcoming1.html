<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upcoming Movies</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; font-family: sans-serif; color: #fff; padding-bottom: 80px; overflow-x: hidden; }
        
        header { padding: 15px; text-align: center; border-bottom: 1px solid #1e293b; position: sticky; top: 0; background: rgba(15, 23, 42, 0.95); z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-size: 22px; font-weight: 900; color: #38bdf8; }

        .search-box { padding: 15px 15px 5px; }
        .search-input { width: 100%; padding: 12px 15px; border-radius: 20px; border: 1px solid #334155; outline: none; background: #1e293b; color: #fff; font-size: 15px; }

        .category-container { display: flex; overflow-x: auto; gap: 8px; padding: 10px 15px 15px; scroll-behavior: smooth; }
        .category-container::-webkit-scrollbar { display: none; }
        .cat-btn { background: rgba(30, 41, 59, 0.8); color: #cbd5e1; border: 1px solid #334155; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .cat-btn.active { background: linear-gradient(45deg, #ef4444, #f97316); color: white; border-color: transparent; }

        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px 20px; }
        
        .movie-card { background: #1e293b; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #334155; cursor: pointer; transition: transform 0.2s; }
        .movie-card:active { transform: scale(0.96); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        
        .countdown-badge { position: absolute; bottom: 60px; right: 8px; background: linear-gradient(45deg, #f59e0b, #d97706); color: #000; font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; text-transform: uppercase; }

        .movie-info { padding: 10px; background: linear-gradient(to top, #1e293b, transparent); margin-top: -30px; position: relative; z-index: 5; }
        .movie-title { font-size: 14px; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; text-shadow: 0 1px 2px black; }
        .movie-date { font-size: 11px; color: #fbbf24; font-weight: bold; }
        
        .lang-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.8); color: #4ade80; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 6px; border: 1px solid #4ade80; z-index: 10; }
        .del-btn { position: absolute; top: 8px; right: 8px; background: #ef4444; color: white; border: none; padding: 5px; border-radius: 5px; cursor: pointer; z-index: 20; }

        .skeleton { background: #1e293b; border-radius: 12px; aspect-ratio: 2/3; position: relative; overflow: hidden; }
        .skeleton::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { left: 200%; } }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; border-top: 1px solid #334155; display: flex; justify-content: space-around; padding: 10px 0; z-index: 2000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 11px; cursor: pointer; gap: 4px; width: 20%; font-weight: bold;}
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: #38bdf8; }

        .fab { position: fixed; bottom: 85px; right: 15px; width: 50px; height: 50px; background: linear-gradient(45deg, #10b981, #059669); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 1000; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(5px); }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; border: 1px solid #334155; }
        .close-icon { position: absolute; top: 12px; right: 15px; width: 30px; height: 30px; border-radius: 50%; background: #334155; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .modal-input, .modal-textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; font-family: inherit; }
        .btn-submit { width: 100%; padding: 12px; background: linear-gradient(45deg, #3b82f6, #2563eb); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; font-size: 15px;}
        
        .detail-poster { width: 100px; height: 150px; border-radius: 10px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .detail-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .detail-desc { font-size: 13px; color: #94a3b8; line-height: 1.5; max-height: 120px; overflow-y: auto; margin-top: 10px; padding-right: 5px;}
    </style>
</head>
<body>
    <header>
        <div class="logo"><i class="fa-solid fa-calendar-days text-blue-400"></i> Upcoming Releases</div>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search upcoming movies..." oninput="handleSearch()">
    </div>

    <div class="category-container" id="filterBox">
        <button class="cat-btn active" onclick="filterMovies('All', this)">All</button>
        <button class="cat-btn" onclick="filterMovies('Hollywood', this)">Hollywood</button>
        <button class="cat-btn" onclick="filterMovies('Bollywood', this)">Bollywood</button>
        <button class="cat-btn" onclick="filterMovies('Tamil', this)">Tamil</button>
        <button class="cat-btn" onclick="filterMovies('Telugu', this)">Telugu</button>
        <button class="cat-btn" onclick="filterMovies('Malayalam', this)">Malayalam</button>
        <button class="cat-btn" onclick="filterMovies('Bengali', this)">Kolkata/Bengali</button>
    </div>

    <div class="grid-container" id="moviesGrid">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <div class="fab" id="adminFab" onclick="document.getElementById('addModal').style.display='flex'" style="display: none;">
        <i class="fa-solid fa-plus"></i>
    </div>

    <!-- Details Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="close-icon" onclick="document.getElementById('detailModal').style.display='none'"><i class="fa-solid fa-xmark"></i></div>
            <div style="display: flex; gap: 15px; align-items: flex-start;">
                <img id="dPoster" src="" class="detail-poster">
                <div>
                    <div class="detail-title" id="dTitle">Movie Title</div>
                    <div style="color: #4ade80; font-size: 12px; font-weight: bold; margin-bottom: 5px;" id="dLang">Language</div>
                    <div style="color: #fbbf24; font-size: 13px; font-weight: bold; margin-bottom: 5px;"><i class="fa-solid fa-star"></i> <span id="dRate">0.0</span>/10</div>
                    <div style="color: #f87171; font-size: 12px; font-weight: bold;" id="dDate">Release Date</div>
                </div>
            </div>
            <div style="margin-top: 15px; border-top: 1px solid #334155; padding-top: 10px;">
                <h4 style="color: white; margin-bottom: 5px;">Overview</h4>
                <div class="detail-desc" id="dDesc">Description goes here...</div>
            </div>
        </div>
    </div>

    <!-- Add Custom Modal (Database Upload Version) -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="close-icon" onclick="document.getElementById('addModal').style.display='none'"><i class="fa-solid fa-xmark"></i></div>
            <h3 style="color: white; margin-bottom: 15px;"><i class="fa-solid fa-plus text-green-400"></i> Add Upcoming</h3>
            <input type="text" id="mTitle" class="modal-input" placeholder="Movie Title">
            <input type="date" id="mDate" class="modal-input">
            <select id="mLang" class="modal-input">
                <option value="Bengali">Kolkata/Bengali</option>
                <option value="Bollywood">Bollywood</option>
                <option value="Hollywood">Hollywood</option>
                <option value="Tamil">Tamil</option>
                <option value="Telugu">Telugu</option>
                <option value="Malayalam">Malayalam</option>
            </select>
            
            <label style="color: #94a3b8; font-size: 12px; margin-bottom: 5px; display: block; text-align: left;">Upload Poster Image:</label>
            <input type="file" id="mPhotoFile" class="modal-input" accept="image/*" style="padding: 8px;">
            
            <div id="uploadStatus" style="color: #fbbf24; font-size: 12px; margin-bottom: 10px; display: none; text-align: left;"><i class="fa-solid fa-spinner fa-spin"></i> Saving directly to Database...</div>

            <textarea id="mDesc" class="modal-textarea" rows="3" placeholder="Movie Overview / Details..."></textarea>
            
            <button class="btn-submit" id="saveBtn" onclick="addCustomMovie()">Save Movie</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='/'">
            <i class="fa-solid fa-house"></i><span>Home</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/'">
            <i class="fa-solid fa-magnifying-glass"></i><span>Search</span>
        </div>
        <div class="nav-item active">
            <i class="fa-solid fa-calendar-days"></i><span>Upcoming</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/'">
            <i class="fa-solid fa-gem"></i><span>Premium</span>
        </div>
        <div class="nav-item" onclick="window.location.href='/'">
            <i class="fa-solid fa-user"></i><span>Profile</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let uid = tg.initDataUnsafe?.user?.id || 0;
        let initData = tg.initData || "";
        let isAdmin = false;
        let allMovies = [];
        let currentFilter = 'All';

        async function checkAdmin() {
            try {
                let res = await fetch('/api/user/' + uid);
                let data = await res.json();
                isAdmin = data.admin;
                if(isAdmin) document.getElementById('adminFab').style.display = 'flex';
            } catch(e) {}
        }

        async function loadUpcomingMovies() {
            try {
                let res = await fetch('/api/upcoming/movies');
                let data = await res.json();
                allMovies = data.movies;
                renderGrid();
            } catch(e) {
                document.getElementById('moviesGrid').innerHTML = "<p style='color:red; grid-column: span 2; text-align:center;'>Failed to load data.</p>";
            }
        }

        function getCountdown(releaseStr) {
            let releaseDate = new Date(releaseStr);
            let today = new Date();
            today.setHours(0,0,0,0);
            
            let diffTime = releaseDate - today;
            let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if(diffDays === 0) return "Releasing Today!";
            if(diffDays === 1) return "Tomorrow!";
            if(diffDays > 1 && diffDays <= 30) return `In ${diffDays} Days`;
            return "";
        }

        function filterMovies(lang, btnElement) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            currentFilter = lang;
            document.getElementById('searchInput').value = "";
            renderGrid();
        }

        function handleSearch() {
            renderGrid();
        }

        function renderGrid() {
            let grid = document.getElementById('moviesGrid');
            let query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            let filtered = currentFilter === 'All' ? allMovies : allMovies.filter(m => m.language === currentFilter);
            if(query) {
                filtered = filtered.filter(m => m.title.toLowerCase().includes(query));
            }
            
            if(filtered.length === 0) {
                grid.innerHTML = `<p style="text-align: center; grid-column: span 2; color: #fbbf24; margin-top:20px;">No movies found!</p>`;
                return;
            }

            grid.innerHTML = filtered.map((m, index) => {
                let dateObj = new Date(m.release_date);
                let formattedDate = dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
                
                let countdownTxt = getCountdown(m.release_date);
                let countdownBadge = countdownTxt ? `<div class="countdown-badge">${countdownTxt}</div>` : '';
                
                let delBtn = (isAdmin && m.is_custom) ? `<button class="del-btn" onclick="deleteCustom('${m._id}', event)"><i class="fa-solid fa-trash"></i></button>` : '';
                
                window[`movieData_${index}`] = m;

                return `
                <div class="movie-card" onclick="openDetails(${index})">
                    <div class="lang-badge">${m.language}</div>
                    ${countdownBadge}
                    ${delBtn}
                    <img src="${m.photo_url}" loading="lazy" onerror="this.src='https://via.placeholder.com/500x750?text=No+Poster'">
                    <div class="movie-info">
                        <div class="movie-title">${m.title}</div>
                        <div class="movie-date"><i class="fa-solid fa-clock"></i> ${formattedDate}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function openDetails(index) {
            let m = window[`movieData_${index}`];
            document.getElementById('dPoster').src = m.photo_url;
            document.getElementById('dTitle').innerText = m.title;
            document.getElementById('dLang').innerText = m.language;
            document.getElementById('dRate').innerText = m.rating;
            
            let dateObj = new Date(m.release_date);
            document.getElementById('dDate').innerHTML = `<i class="fa-solid fa-calendar"></i> ` + dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
            
            document.getElementById('dDesc').innerText = m.overview || "No details available.";
            document.getElementById('detailModal').style.display = 'flex';
        }

        // 🛑 THE ULTIMATE FIX: Compress image & save directly to database!
        async function addCustomMovie() {
            let title = document.getElementById('mTitle').value;
            let rDate = document.getElementById('mDate').value;
            let fileInput = document.getElementById('mPhotoFile');
            
            if(!title || !rDate) return tg.showAlert("Title and Date are required!");
            if(fileInput.files.length === 0) return tg.showAlert("Please select a poster image!");

            let saveBtn = document.getElementById('saveBtn');
            let statusTxt = document.getElementById('uploadStatus');
            
            saveBtn.disabled = true;
            saveBtn.style.background = "#475569";
            saveBtn.innerText = "Processing...";
            statusTxt.style.display = "block";

            let file = fileInput.files[0];
            let reader = new FileReader();

            reader.onload = function(e) {
                let img = new Image();
                img.onload = async function() {
                    // ছবিকে ছোট করে কম্প্রেস করা হচ্ছে (যাতে ডাটাবেসে লোড না পড়ে)
                    let canvas = document.createElement('canvas');
                    let MAX_WIDTH = 400; // সাইজ লিমিট
                    let scaleSize = MAX_WIDTH / img.width;
                    if(scaleSize > 1) scaleSize = 1; 
                    
                    canvas.width = img.width * scaleSize;
                    canvas.height = img.height * scaleSize;
                    
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // কোডে রূপান্তর
                    let base64String = canvas.toDataURL('image/jpeg', 0.8);

                    let payload = {
                        uid: uid, initData: initData,
                        title: title,
                        release_date: rDate,
                        language: document.getElementById('mLang').value,
                        overview: document.getElementById('mDesc').value,
                        photo_url: base64String // সরাসরি ডাটাবেসে সেভ হবে
                    };

                    try {
                        let res = await fetch('/api/upcoming/custom', { 
                            method: 'POST', 
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(payload)
                        });
                        
                        let result = await res.json();
                        
                        if(result.ok) {
                            document.getElementById('addModal').style.display='none';
                            tg.showAlert("Added Successfully!");
                            
                            document.getElementById('mTitle').value = '';
                            document.getElementById('mDate').value = '';
                            fileInput.value = '';
                            document.getElementById('mDesc').value = '';
                            
                            document.getElementById('moviesGrid').innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
                            loadUpcomingMovies();
                        } else {
                            tg.showAlert("Failed: " + result.msg);
                        }
                    } catch(error) {
                        tg.showAlert("Network Error! Please try again.");
                    } finally {
                        saveBtn.disabled = false;
                        saveBtn.style.background = "linear-gradient(45deg, #3b82f6, #2563eb)";
                        saveBtn.innerText = "Save Movie";
                        statusTxt.style.display = "none";
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function deleteCustom(id, event) {
            event.stopPropagation();
            if(!confirm("Are you sure you want to delete this movie?")) return;
            let res = await fetch('/api/upcoming/custom/' + id, { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({uid: uid, initData: initData}) });
            let result = await res.json();
            if(result.ok) loadUpcomingMovies();
        }

        checkAdmin();
        loadUpcomingMovies();
    </script>
</body>
</html>
